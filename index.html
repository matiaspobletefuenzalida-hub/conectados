<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conectado.cl - Red Institucional Completa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           SISTEMA DE DISEÑO: ARQUITECTURA "CLEAR CLOUD SYSTEM" (PREMIUM LIGHT)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            /* Fondos Estudiados (Claros, descansados, cero blanco clínico) */
            --bg-body: #e4e8f0;          /* Gris azulado de fondo general */
            --bg-card: #f1f4f9;          /* Superficie de tarjetas y contenedores */
            --bg-input: #e2e7f0;         /* Inputs internos integrados */
            --bg-input-focus: #fafbfc;
            
            /* Variables de Enfoque y Acentos */
            --accent: #4f46e5;           /* Indigo de alta gama */
            --accent-hover: #4338ca;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --success: #10b981;          /* Verde esmeralda para confirmación visual */
            
            /* Estados de Categoría y Badges */
            --color-comunicado: #0284c7;  
            --bg-comunicado: rgba(2, 132, 199, 0.08);
            --color-consulta: #b45309;    
            --bg-consulta: rgba(180, 83, 9, 0.07);

            /* Tipografía Corporativa Estricta (Sin Negros Absolutos) */
            --text-title: #1b253c;       /* Azul marino profundo muy distinguido */
            --text-body: #3c485e;        /* Gris de alta densidad de lectura */
            --text-muted: #64748b;       /* Slate medio para fechas y placeholders */
            
            /* Estructuras y Bordes */
            --border-premium: rgba(0, 0, 0, 0.05);
            --border-interactive: #cbd5e1;
            --radius-lg: 20px;
            --radius-md: 12px;
            
            /* Sombras Orgánicas Avanzadas */
            --shadow-premium: 0 20px 40px -15px rgba(111, 126, 153, 0.15), 0 1px 3px rgba(0, 0, 0, 0.02);
            --shadow-interactive: 0 4px 12px rgba(79, 70, 229, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-body);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* ==========================================================================
           HEADER PREMIUM ALINEADO A LA IZQUIERDA CON LOGO AVANZADO
           ========================================================================== */
        .main-header {
            background-color: rgba(241, 244, 249, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-premium);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.01);
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-start; /* Alineación total a la izquierda */
            align-items: center;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-wrapper {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 6px rgba(79, 70, 229, 0.15));
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.8px;
        }

        .brand h1 span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.2px;
        }

        /* ==========================================================================
           CONTENEDORES Y ESTRUCTURA DE FORMULARIOS
           ========================================================================== */
        .main-content {
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-premium);
            border-radius: var(--radius-lg);
            padding: 36px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-premium);
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-title);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .form-grid.split { grid-template-columns: 1.2fr 0.8fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 22px;
        }

        .form-group label, .label-block {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-title);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        input[type="text"], select, textarea {
            font-family: inherit;
            font-size: 14.5px;
            padding: 14px 18px;
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            background-color: var(--bg-input);
            color: var(--text-title);
            outline: none;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        input:focus, select:focus, textarea:focus {
            background-color: var(--bg-input-focus);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .select-wrapper { position: relative; }
        .select-wrapper select { width: 100%; appearance: none; cursor: pointer; }

        /* ==========================================================================
           BOTONES INTERACTIVOS DE ROL (CHIPS CON COMPROBACIÓN VISUAL)
           ========================================================================== */
        .role-selector-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .role-chip-btn {
            position: relative; /* Clave para posicionar el check de forma flotante */
            flex: 1;
            min-width: 120px;
            font-family: inherit;
            background-color: var(--bg-input);
            color: var(--text-body);
            border: 2px solid transparent; 
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .role-chip-btn:hover {
            background-color: var(--border-interactive);
            color: var(--text-title);
            transform: translateY(-1px);
        }

        /* ESTADO PRESIONADO / ACTIVO DEFINITIVO */
        .role-chip-btn.active {
            background-color: var(--bg-card);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            transform: scale(1.02);
            font-weight: 700;
        }

        /* Check Flotante de Confirmación */
        .role-chip-btn.active::after {
            content: "✓";
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--success);
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .chip-icon { font-size: 16px; }

        /* Botón de Envío */
        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: var(--accent);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
            transform: translateY(-1px);
        }

        /* ==========================================================================
           BÚSQUEDA Y FILTRADO AVANZADO
           ========================================================================== */
        .filters-section { margin-bottom: 32px; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box input { width: 100%; padding: 16px 16px 16px 48px; background-color: var(--bg-card); border: 1px solid var(--border-premium); box-shadow: var(--shadow-premium); border-radius: var(--radius-lg); }
        
        .filter-tabs { display: flex; gap: 10px; }
        .filter-btn { font-size: 13.5px; font-weight: 700; padding: 10px 20px; border: 1px solid transparent; background-color: var(--bg-card); color: var(--text-muted); border-radius: 40px; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.01); }
        .filter-btn:hover { color: var(--text-title); background-color: var(--bg-input); }
        .filter-btn.active { background-color: var(--text-title); color: var(--bg-card); }

        /* ==========================================================================
           TARJETAS DE LA LÍNEA DE TIEMPO (FEED)
           ========================================================================== */
        .post-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-premium);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-premium);
        }

        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .meta-user { display: flex; flex-direction: column; }
        .post-author { font-weight: 800; font-size: 16px; color: var(--text-title); }
        .post-role { font-size: 12.5px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
        .post-date { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }

        .badge { font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.comunicado { background-color: var(--bg-comunicado); color: var(--color-comunicado); }
        .badge.consulta { background-color: var(--bg-consulta); color: var(--color-consulta); }

        .post-title { font-size: 19px; font-weight: 800; margin-bottom: 12px; color: var(--text-title); line-height: 1.4; }
        .post-body { font-size: 15px; color: var(--text-body); white-space: pre-line; }

        /* Hilos de Comentarios / Respuestas */
        .replies-container { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--bg-input); }
        .replies-title { font-size: 13px; font-weight: 800; color: var(--text-title); margin-bottom: 14px; text-transform: uppercase; }
        
        .reply-item { background-color: rgba(226, 231, 240, 0.4); border-left: 4px solid var(--accent); padding: 14px 18px; border-radius: 4px var(--radius-md) var(--radius-md) 4px; margin-bottom: 12px; }
        .reply-meta { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; }
        .reply-user { font-weight: 800; color: var(--text-title); }
        .reply-role { color: var(--text-muted); font-weight: 600; font-size: 11.5px; margin-left: 4px; text-transform: uppercase; }
        .reply-body { font-size: 14px; color: var(--text-body); }

        .reply-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .reply-mini-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 480px){ .reply-mini-grid { grid-template-columns: 1fr 1fr; } }

        .input-reply-small { padding: 10px 14px; font-size: 13px; background-color: var(--bg-input); }
        .btn-reply { align-self: flex-end; background-color: var(--text-title); color: #ffffff; border: none; padding: 8px 18px; font-size: 12.5px; font-weight: 700; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s; }
        .btn-reply:hover { background-color: var(--accent); }

        /* Micro-interacciones */
        .transition-card { animation: cardArrival 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .new-post-anim { animation: postPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

        @keyframes cardArrival { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes postPop { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .spinner { animation: spin 0.85s linear infinite; width: 20px; height: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        .empty-state { text-align: center; padding: 60px 30px; background-color: var(--bg-card); border: 2px dashed var(--border-interactive); border-radius: var(--radius-lg); box-shadow: var(--shadow-premium); }
        .empty-state h3 { color: var(--text-title); font-size: 18px; font-weight: 800; margin-top: 14px; }
        .empty-state p { color: var(--text-muted); font-size: 14.5px; margin-top: 4px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="brand">
                    <div class="logo-wrapper">
                        <svg class="logo-svg" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="netGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#4f46e5" />
                                    <stop offset="100%" stop-color="#06b6d4" />
                                </linearGradient>
                                <linearGradient id="netGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#ec4899" />
                                </linearGradient>
                            </defs>
                            <circle cx="16" cy="16" r="6" fill="url(#netGrad1)" />
                            <circle cx="34" cy="20" r="8" fill="url(#netGrad2)" />
                            <circle cx="22" cy="36" r="5" fill="url(#netGrad1)" />
                            <path d="M16 16 L34 20 M34 20 L22 36 M22 36 L16 16" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" opacity="0.4" fill="none"/>
                            <circle cx="25" cy="22" r="3" fill="#06b6d4" />
                        </svg>
                    </div>
                    <h1>conectado<span>.cl</span></h1>
                </div>
                <p class="subtitle">Plataforma de Comunicación Escolar Integrada</p>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="form-section transition-card">
            <div class="section-header">
                <h2 class="section-title">Crear Nueva Publicación</h2>
            </div>
            <form id="qa-form">
                <div class="form-grid split">
                    <div class="form-group">
                        <label for="author-name">Nombre Completo</label>
                        <input type="text" id="author-name" placeholder="Ej. Juan Pablo Correa" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Clasificación de Mensaje</label>
                        <div class="select-wrapper">
                            <select id="category" required>
                                <option value="Comunicado">📢 Aviso Oficial / Circular</option>
                                <option value="Consulta">❓ Consulta / Solicitud</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-block">Selecciona tu Rol (Requerido)</label>
                    <div class="role-selector-container" id="role-selector-group">
                        <button type="button" class="role-chip-btn" data-role="Docente">
                            <span class="chip-icon">🏫</span> Docente
                        </button>
                        <button type="button" class="role-chip-btn" data-role="Apoderado">
                            <span class="chip-icon">🏠</span> Apoderado
                        </button>
                        <button type="button" class="role-chip-btn" data-role="Funcionario">
                            <span class="chip-icon">💼</span> Funcionario
                        </button>
                    </div>
                    <input type="hidden" id="author-role" required>
                </div>

                <div class="form-group">
                    <label for="title">Título o Asunto</label>
                    <input type="text" id="title" placeholder="Ej. Citación a reunión extraordinario..." required>
                </div>

                <div class="form-group">
                    <label for="message">Detalle del Mensaje</label>
                    <textarea id="message" rows="4" placeholder="Redacta la información clara para la comunidad..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <span class="btn-text">Publicar en la Línea de Tiempo</span>
                    <svg class="spinner hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.2"></circle><path d="M12 2C6.47715 2 2 6.47715 2 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path></svg>
                </button>
            </form>
        </section>

        <section class="filters-section transition-card">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Buscar por palabra clave, nombres o roles...">
            </div>
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="Todos">Todos los registros</button>
                <button class="filter-btn" data-filter="Comunicado">Circulares Oficiales</button>
                <button class="filter-btn" data-filter="Consulta">Consultas Abiertas</button>
            </div>
        </section>

        <section class="feed-section">
            <div id="posts-container"></div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = 'conectado_db_vfinal_unified';
        let posts = [];
        let currentFilter = 'Todos';
        let searchQuery = '';

        // Captura de nodos del DOM
        const qaForm = document.getElementById('qa-form');
        const postsContainer = document.getElementById('posts-container');
        const searchInput = document.getElementById('search-input');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = submitBtn.querySelector('.btn-text');
        const spinner = submitBtn.querySelector('.spinner');

        const roleChips = document.querySelectorAll('.role-chip-btn');
        const hiddenRoleInput = document.getElementById('author-role');

        function init() {
            // Carga inicial segura con try-catch
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                posts = stored ? JSON.parse(stored) : [];
            } catch (e) {
                console.error("Inconsistencia en el almacenamiento local. Reseteando estructuras.", e);
                posts = [];
            }
            renderPosts();
            setupEventListeners();
            setupRoleSelector();
        }

        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
            } catch (e) {
                console.error("Fallo crítico al escribir en localStorage:", e);
            }
        }

        function setupEventListeners() {
            qaForm.addEventListener('submit', handleCreatePost);

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderPosts();
            });

            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    renderPosts();
                });
            });
        }

        // Lógica interactiva con feedback visual garantizado para los chips de rol
        function setupRoleSelector() {
            roleChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    // Remover estado activo de los demás
                    roleChips.forEach(c => c.classList.remove('active'));
                    
                    // Aplicar estado activo al presionado (Esto activa el check verde en CSS)
                    chip.classList.add('active');
                    
                    // Asignar el valor de forma segura al input oculto
                    hiddenRoleInput.value = chip.getAttribute('data-role');
                });
            });
        }

        function handleCreatePost(e) {
            e.preventDefault();

            // Verificación rígida de rol presionado
            if (!hiddenRoleInput.value) {
                alert('Debe hacer clic y presionar uno de los Roles ("Docente", "Apoderado" o "Funcionario") para publicar.');
                return;
            }

            // Bloqueo de doble envío por lentitud (UX Engine)
            submitBtn.disabled = true;
            btnText.textContent = 'Indexando publicación oficial...';
            spinner.classList.remove('hidden');

            const nameInput = document.getElementById('author-name').value.trim();
            const roleValue = hiddenRoleInput.value;
            const categoryInput = document.getElementById('category').value;
            const titleInput = document.getElementById('title').value.trim();
            const messageInput = document.getElementById('message').value.trim();

            setTimeout(() => {
                const newPost = {
                    id: 'post_' + Date.now(),
                    authorName: nameInput,
                    authorRole: roleValue,
                    category: categoryInput,
                    title: titleInput,
                    message: messageInput,
                    date: new Date().toLocaleString('es-CL', { 
                        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
                    }),
                    replies: []
                };

                // Añadir al inicio de la colección y guardar inmediatamente
                posts.unshift(newPost);
                saveToStorage();
                
                // Forzar re-renderizado destacando la nueva publicación
                renderPosts(newPost.id); 
                
                // Limpieza absoluta y deselección de botones
                qaForm.reset();
                roleChips.forEach(c => c.classList.remove('active'));
                hiddenRoleInput.value = '';

                submitBtn.disabled = false;
                btnText.textContent = 'Publicar en la Línea de Tiempo';
                spinner.classList.add('hidden');
            }, 500);
        }

        function handleCreateReply(e, postId) {
            e.preventDefault();
            const form = e.target;
            const name = form.querySelector('.reply-name').value.trim();
            const role = form.querySelector('.reply-role').value.trim();
            const body = form.querySelector('.reply-body-input').value.trim();

            const postIndex = posts.findIndex(p => p.id === postId);
            if (postIndex !== -1) {
                const newReply = {
                    id: 'reply_' + Date.now(),
                    authorName: name,
                    authorRole: role,
                    message: body,
                    date: new Date().toLocaleString('es-CL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })
                };

                posts[postIndex].replies.push(newReply);
                saveToStorage(); // Guarda los comentarios de forma persistente
                renderPosts();
            }
        }

        function renderPosts(newPostId = null) {
            postsContainer.innerHTML = '';

            const filteredPosts = posts.filter(post => {
                const matchesFilter = (currentFilter === 'Todos' || post.category === currentFilter);
                const matchesSearch = (
                    post.title.toLowerCase().includes(searchQuery) ||
                    post.message.toLowerCase().includes(searchQuery) ||
                    post.authorName.toLowerCase().includes(searchQuery) ||
                    post.authorRole.toLowerCase().includes(searchQuery)
                );
                return matchesFilter && matchesSearch;
            });

            if (filteredPosts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="empty-state transition-card">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.8" style="margin: 0 auto;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                        <h3>Línea de tiempo vacía</h3>
                        <p>No hay mensajes publicados con los criterios de búsqueda actuales.</p>
                    </div>
                `;
                return;
            }

            filteredPosts.forEach(post => {
                const isNew = post.id === newPostId;
                const badgeClass = post.category === 'Comunicado' ? 'comunicado' : 'consulta';
                const card = document.createElement('article');
                card.className = `post-card ${isNew ? 'new-post-anim' : 'transition-card'}`;

                let repliesHTML = '';
                if (post.replies && post.replies.length > 0) {
                    repliesHTML = post.replies.map(reply => `
                        <div class="reply-item">
                            <div class="reply-meta">
                                <div>
                                    <span class="reply-user">${escapeHTML(reply.authorName)}</span>
                                    <span class="reply-role">• ${escapeHTML(reply.authorRole)}</span>
                                </div>
                                <span class="reply-date">${reply.date}</span>
                            </div>
                            <p class="reply-body">${escapeHTML(reply.message)}</p>
                        </div>
                    `).join('');
                }

                card.innerHTML = `
                    <div class="post-header">
                        <div class="meta-user">
                            <span class="post-author">${escapeHTML(post.authorName)}</span>
                            <span class="post-role">${escapeHTML(post.authorRole)}</span>
                            <span class="post-date">${post.date}</span>
                        </div>
                        <span class="badge ${badgeClass}">${post.category}</span>
                    </div>
                    <h3 class="post-title">${escapeHTML(post.title)}</h3>
                    <p class="post-body">${escapeHTML(post.message)}</p>

                    <div class="replies-container">
                        ${post.replies.length > 0 ? `<h4 class="replies-title">Respuestas de la comunidad (${post.replies.length})</h4>` : ''}
                        <div class="replies-list">${repliesHTML}</div>
                        
                        <form class="reply-form" data-postid="${post.id}">
                            <div class="reply-mini-grid">
                                <input type="text" placeholder="Tu nombre" class="input-reply-small reply-name" required>
                                <input type="text" placeholder="Tu rol (ej. Apoderado)" class="input-reply-small reply-role" required>
                            </div>
                            <input type="text" placeholder="Añadir comentario oficial al hilo..." class="input-reply-small reply-body-input" required>
                            <button type="submit" class="btn-reply">Comentar</button>
                        </form>
                    </div>
                `;

                const replyForm = card.querySelector('.reply-form');
                replyForm.addEventListener('submit', (e) => handleCreateReply(e, post.id));

                postsContainer.appendChild(card);
            });
        }

        // Sistema de escape estricto contra ataques XSS
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
