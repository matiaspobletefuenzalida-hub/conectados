<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conectado.cl - Plataforma Institucional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           SISTEMA DE DISEÑO: SLATE & SKY (Premium Light)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-body: #f1f5f9;          
            --bg-card: #ffffff;
            --bg-input: #f8fafc;         
            
            --primary-dark: #0f172a;     
            --primary: #1e293b;          
            --accent: #0284c7;           
            --accent-hover: #0369a1;
            --success: #10b981;
            --danger: #ef4444;
            
            --text-muted: #475569;       
            --text-light: #64748b;
            --border-soft: #e2e8f0;
            --border-focus: #bae6fd;     
            
            --shadow-card: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
            --radius-lg: 12px;
            --radius-md: 8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--primary);
            line-height: 1.6;
            padding-bottom: 80px;
        }

        /* ==========================================================================
           HEADER INSTITUCIONAL Y CONTROL ADMIN
           ========================================================================== */
        .main-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-soft);
            padding: 20px 16px;
        }

        .header-container {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-wrapper {
            display: flex;
            flex-direction: column;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-container {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .logo-svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            margin-top: 2px;
        }

        .btn-admin-toggle {
            background-color: var(--bg-input);
            border: 1px solid var(--border-soft);
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .btn-admin-toggle.logged-in {
            background-color: #fef2f2;
            border-color: #fca5a5;
            color: var(--danger);
        }

        .main-content {
            max-width: 680px;
            margin: 32px auto;
            padding: 0 16px;
        }

        /* ==========================================================================
           FORMULARIOS Y CHIPS INTERACTIVOS
           ========================================================================== */
        .form-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-card);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--primary-dark);
            border-bottom: 2px solid var(--bg-body);
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 600px) {
            .form-grid.triple { grid-template-columns: 1.2fr 0.9fr 0.9fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label, .label-block {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        .role-selector-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .role-chip-btn {
            position: relative;
            flex: 1;
            min-width: 100px;
            font-family: inherit;
            background-color: var(--bg-input);
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .role-chip-btn.active {
            background-color: var(--bg-card);
            color: var(--accent);
            border-color: var(--accent);
        }

        .role-chip-btn.active::after {
            content: "✓";
            position: absolute;
            top: -6px;
            right: -6px;
            background-color: var(--success);
            color: white;
            font-size: 10px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group input, .form-group select, .form-group textarea {
            font-family: inherit;
            font-size: 14px;
            padding: 12px 14px;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            background-color: var(--bg-input);
            color: var(--primary-dark);
            outline: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--accent);
            background-color: var(--bg-card);
            box-shadow: 0 0 0 3px var(--border-focus);
        }

        .btn-submit {
            display: block;
            width: 100%;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            border: 1px solid var(--accent-hover);
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(2, 132, 199, 0.2);
        }

        /* ==========================================================================
           ÁREA DE FILTROS AVANZADOS (INCLUYE ASIGNATURAS CHILE)
           ========================================================================== */
        .filters-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-card);
        }

        .search-box { position: relative; margin-bottom: 16px; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .search-box input { width: 100%; padding: 12px 12px 12px 44px; font-size: 14px; border: 1px solid var(--border-soft); border-radius: var(--radius-md); outline: none; width: 100%; }
        
        .filter-controls-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        @media(min-width: 500px) {
            .filter-controls-grid { grid-template-columns: 1fr 1fr; }
        }

        .filter-select-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-select-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }
        .filter-select-group select {
            padding: 10px;
            font-size: 13.5px;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            background-color: var(--bg-input);
            outline: none;
            width: 100%;
        }

        /* ==========================================================================
           FEED / MURO DE PUBLICACIONES
           ========================================================================== */
        .post-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .author-box { display: flex; flex-direction: column; }
        .post-author { font-weight: 700; font-size: 14.5px; color: var(--primary-dark); }
        .post-role { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .post-date { font-size: 12px; color: var(--text-light); }

        .badges-wrapper { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
        .badge.comunicado { background-color: #f0f9ff; color: var(--accent-hover); border: 1px solid #bae6fd; }
        .badge.consulta { background-color: #f8fafc; color: var(--text-muted); border: 1px solid var(--border-soft); }
        .badge.subject { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        .post-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; color: var(--primary-dark); }
        .post-body { font-size: 14.5px; color: var(--text-muted); white-space: pre-line; }

        .btn-delete-post {
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            color: var(--danger);
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-left: 6px;
        }

        .btn-delete-post:hover { background-color: var(--danger); color: white; }
        .new-post-anim { animation: postPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes postPop { from { opacity: 0; transform: scale(0.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .empty-state { text-align: center; padding: 40px 20px; background-color: var(--bg-card); border: 2px dashed var(--border-soft); border-radius: var(--radius-lg); }
        .empty-state h3 { font-size: 15px; color: var(--primary); margin-bottom: 4px; }
        .empty-state p { font-size: 13.5px; color: var(--text-light); }
        
        .spinner { animation: spin 0.8s linear infinite; width: 16px; height: 16px; margin-left: 6px; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand-wrapper">
                <div class="brand">
                    <div class="logo-container">
                        <svg class="logo-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#312e81" />
                                    <stop offset="100%" stop-color="#4f46e5" />
                                </linearGradient>
                            </defs>
                            <path d="M26 12C32.627 12 38 16.477 38 22C38 27.523 32.627 32 26 32C24.4 32 22.88 31.7 21.5 31.18L16 34L17.2 29.5C14.6 27.6 14 24.9 14 22C14 16.477 19.373 12 26 12Z" fill="#e0e7ff" opacity="0.9"/>
                            <path d="M14 8C20.627 8 26 12.477 26 18C26 23.523 20.627 28 14 28C12.4 28 10.88 27.7 9.5 27.18L4 30L5.2 25.5C2.6 23.6 2 20.9 2 18C2 12.477 7.373 8 14 8Z" fill="url(#brandGrad)"/>
                        </svg>
                    </div>
                    <h1>conectado.cl</h1>
                </div>
                <p class="subtitle">Red de comunicación escolar chilena</p>
            </div>
            <div>
                <button type="button" class="btn-admin-toggle" id="admin-btn">Modo Admin</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="form-section">
            <h2 class="section-title">Crear Publicación</h2>
            <form id="qa-form">
                <div class="form-grid triple">
                    <div class="form-group">
                        <label for="author">Remitente</label>
                        <input type="text" id="author" placeholder="Ej. Juan Valenzuela" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Clasificación</label>
                        <select id="category" required>
                            <option value="Comunicado">📢 Comunicado</option>
                            <option value="Consulta">❓ Consulta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="subject">Asignatura Relacionada</label>
                        <select id="subject" required>
                            <option value="General">💼 Institucional / General</option>
                            <option value="Lenguaje">📚 Lenguaje y Comunicación</option>
                            <option value="Matemáticas">📐 Matemáticas</option>
                            <option value="Ciencias">🔬 Ciencias Naturales / Biología</option>
                            <option value="Historia">🌍 Historia, Geografía y Cs. Sociales</option>
                            <option value="Inglés">🇬🇧 Idioma Extranjero: Inglés</option>
                            <option value="Artes">🎨 Artes Visuales / Música</option>
                            <option value="Educación Física">🏃 Educación Física y Salud</option>
                            <option value="Tecnología">💻 Tecnología / Informática</option>
                            <option value="Orientación">🌱 Orientación / Jefatura</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-block">Selecciona tu Rol</label>
                    <div class="role-selector-container">
                        <button type="button" class="role-chip-btn" data-role="Docente">🏫 Docente</button>
                        <button type="button" class="role-chip-btn" data-role="Apoderado">🏠 Apoderado</button>
                        <button type="button" class="role-chip-btn" data-role="Funcionario">💼 Funcionario</button>
                    </div>
                    <input type="hidden" id="author-role" required>
                </div>

                <div class="form-group">
                    <label for="title">Asunto</label>
                    <input type="text" id="title" placeholder="Ej. Temario primera prueba sumativa..." required>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" rows="4" placeholder="Escribe los detalles aquí..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <span class="btn-text">Publicar en el Muro</span>
                    <svg class="spinner hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.3"></circle><path d="M12 2C6.47715 2 2 6.47715 2 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path></svg>
                </button>
            </form>
        </section>

        <section class="filters-section">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Buscar por palabra clave, nombre o texto...">
            </div>
            
            <div class="filter-controls-grid">
                <div class="filter-select-group">
                    <label for="filter-category">Tipo de Entrada</label>
                    <select id="filter-category">
                        <option value="Todos">Ver todo el Muro</option>
                        <option value="Comunicado">Solo Comunicados</option>
                        <option value="Consulta">Solo Consultas</option>
                    </select>
                </div>
                <div class="filter-select-group">
                    <label for="filter-subject">Filtrar por Asignatura</label>
                    <select id="filter-subject">
                        <option value="Todos">Todas las Asignaturas</option>
                        <option value="General">Institucional / General</option>
                        <option value="Lenguaje">Lenguaje y Comunicación</option>
                        <option value="Matemáticas">Matemáticas</option>
                        <option value="Ciencias">Ciencias Naturales</option>
                        <option value="Historia">Historia y Geografía</option>
                        <option value="Inglés">Inglés</option>
                        <option value="Artes">Artes / Música</option>
                        <option value="Educación Física">Educación Física</option>
                        <option value="Tecnología">Tecnología</option>
                        <option value="Orientación">Orientación</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="posts-container"></section>
    </main>

    <script>
        const STORAGE_KEY = 'conectado_forum_posts_v4_subjects';
        let posts = [];
        let filterCategory = 'Todos';
        let filterSubject = 'Todos';
        let searchQuery = '';
        let isAdmin = false;

        const qaForm = document.getElementById('qa-form');
        const postsContainer = document.getElementById('posts-container');
        const searchInput = document.getElementById('search-input');
        const selectFilterCategory = document.getElementById('filter-category');
        const selectFilterSubject = document.getElementById('filter-subject');
        
        const submitBtn = document.getElementById('submit-btn');
        const btnText = submitBtn.querySelector('.btn-text');
        const spinner = submitBtn.querySelector('.spinner');
        const roleChips = document.querySelectorAll('.role-chip-btn');
        const hiddenRoleInput = document.getElementById('author-role');
        const adminBtn = document.getElementById('admin-btn');

        function init() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                posts = stored ? JSON.parse(stored) : [];
            } catch (e) {
                posts = [];
            }
            renderPosts();
            setupEventListeners();
        }

        function setupEventListeners() {
            qaForm.addEventListener('submit', handleCreatePost);

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderPosts();
            });

            selectFilterCategory.addEventListener('change', (e) => {
                filterCategory = e.target.value;
                renderPosts();
            });

            selectFilterSubject.addEventListener('change', (e) => {
                filterSubject = e.target.value;
                renderPosts();
            });

            roleChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    roleChips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    hiddenRoleInput.value = chip.getAttribute('data-role');
                });
            });

            adminBtn.addEventListener('click', handleAdminToggle);
        }

        function handleAdminToggle() {
            if (isAdmin) {
                isAdmin = false;
                adminBtn.textContent = "Modo Admin";
                adminBtn.classList.remove('logged-in');
                renderPosts();
                alert('Sesión de administrador cerrada.');
            } else {
                const user = prompt('Usuario Administrador:');
                const pass = prompt('Contraseña:');
                if (user === 'admin' && pass === 'admin') {
                    isAdmin = true;
                    adminBtn.textContent = "Salir Admin";
                    adminBtn.classList.add('logged-in');
                    renderPosts();
                    alert('¡Acceso concedido! Modo administrador activo para remover elementos.');
                } else {
                    alert('Credenciales incorrectas.');
                }
            }
        }

        function handleCreatePost(e) {
            e.preventDefault();
            if (!hiddenRoleInput.value) {
                alert('Por favor, selecciona un Rol corporativo.');
                return;
            }

            submitBtn.disabled = true;
            btnText.textContent = 'Enviando al servidor...';
            spinner.classList.remove('hidden');

            setTimeout(() => {
                const newPost = {
                    id: 'post_' + Date.now(),
                    author: document.getElementById('author').value.trim(),
                    role: hiddenRoleInput.value,
                    category: document.getElementById('category').value,
                    subject: document.getElementById('subject').value,
                    title: document.getElementById('title').value.trim(),
                    message: document.getElementById('message').value.trim(),
                    date: new Date().toLocaleString('es-CL', { 
                        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
                    })
                };

                posts.unshift(newPost);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
                
                renderPosts(newPost.id);
                qaForm.reset();
                roleChips.forEach(c => c.classList.remove('active'));
                hiddenRoleInput.value = '';

                submitBtn.disabled = false;
                btnText.textContent = 'Publicar en el Muro';
                spinner.classList.add('hidden');
            }, 500);
        }

        function deletePost(postId) {
            if (!isAdmin) return;
            if (confirm('¿Desea borrar permanentemente este registro?')) {
                posts = posts.filter(p => p.id !== postId);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
                renderPosts();
            }
        }

        function renderPosts(newPostId = null) {
            postsContainer.innerHTML = '';

            const filtered = posts.filter(post => {
                const matchesCategory = (filterCategory === 'Todos' || post.category === filterCategory);
                const matchesSubject = (filterSubject === 'Todos' || post.subject === filterSubject);
                const matchesSearch = (
                    post.title.toLowerCase().includes(searchQuery) ||
                    post.message.toLowerCase().includes(searchQuery) ||
                    post.author.toLowerCase().includes(searchQuery)
                );
                return matchesCategory && matchesSubject && matchesSearch;
            });

            if (filtered.length === 0) {
                postsContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>Muro vacío</h3>
                        <p>No se encontraron publicaciones con los filtros seleccionados.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(post => {
                const isNew = post.id === newPostId;
                const card = document.createElement('article');
                card.className = `post-card ${isNew ? 'new-post-anim' : ''}`;

                const catBadge = post.category === 'Comunicado' ? 'comunicado' : 'consulta';
                const subLabel = document.querySelector(`#subject option[value="${post.subject}"]`)?.text || post.subject;

                card.innerHTML = `
                    <div class="post-header">
                        <div class="author-box">
                            <span class="post-author">${escapeHTML(post.author)}</span>
                            <span class="post-role">${escapeHTML(post.role)}</span>
                            <span class="post-date">${post.date}</span>
                        </div>
                        <div class="badges-wrapper">
                            <span class="badge ${catBadge}">${post.category}</span>
                            <span class="badge subject">${subLabel.split(' ').slice(0,2).join(' ')}</span>
                            ${isAdmin ? `<button class="btn-delete-post" onclick="deletePost('${post.id}')">Eliminar</button>` : ''}
                        </div>
                    </div>
                    <h3 class="post-title">${escapeHTML(post.title)}</h3>
                    <p class="post-body">${escapeHTML(post.message)}</p>
                `;
                postsContainer.appendChild(card);
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
