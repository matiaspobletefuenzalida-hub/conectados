<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conectado.cl - Red Institucional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           DISEÑO ORIGINAL: "CLEAR CLOUD SYSTEM" (PREMIUM LIGHT)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-body: #e4e8f0;          
            --bg-card: #f1f4f9;          
            --bg-input: #e2e7f0;         
            --bg-input-focus: #fafbfc;
            
            --accent: #4f46e5;           
            --accent-hover: #4338ca;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --success: #10b981;          
            --danger: #ef4444;           
            
            --color-comunicado: #0284c7;  
            --bg-comunicado: rgba(2, 132, 199, 0.08);
            --color-consulta: #b45309;    
            --bg-consulta: rgba(180, 83, 9, 0.07);
            --color-asignatura: #059669;
            --bg-asignatura: rgba(16, 185, 129, 0.1);

            --text-title: #1b253c;       
            --text-body: #3c485e;        
            --text-muted: #64748b;       
            
            --border-premium: rgba(0, 0, 0, 0.05);
            --border-interactive: #cbd5e1;
            --radius-lg: 20px;
            --radius-md: 12px;
            
            --shadow-premium: 0 20px 40px -15px rgba(111, 126, 153, 0.15), 0 1px 3px rgba(0, 0, 0, 0.02);
            --shadow-interactive: 0 4px 12px rgba(79, 70, 229, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-body);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* HEADER ALINEADO A LA IZQUIERDA CON LOGO CORREGIDO */
        .main-header {
            background-color: rgba(241, 244, 249, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-premium);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.01);
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-wrapper {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .logo-svg {
            width: 44px;
            height: 44px;
            filter: drop-shadow(0 4px 6px rgba(79, 70, 229, 0.15));
        }

        .brand h1 { font-size: 28px; font-weight: 800; color: var(--text-title); letter-spacing: -0.8px; }
        .brand h1 span { color: var(--accent); }
        .subtitle { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-top: 2px; }

        /* MODO ADMINISTRADOR BOTÓN */
        .btn-admin {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-admin:hover { background: var(--bg-input); color: var(--text-title); }
        .btn-admin.active { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }

        /* FORMULARIOS */
        .main-content { max-width: 760px; margin: 40px auto; padding: 0 20px; }
        .form-section { background-color: var(--bg-card); border: 1px solid var(--border-premium); border-radius: var(--radius-lg); padding: 36px; margin-bottom: 32px; box-shadow: var(--shadow-premium); }
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; color: var(--text-title); }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; } }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
        .form-group label, .label-block { font-size: 12px; font-weight: 700; color: var(--text-title); text-transform: uppercase; letter-spacing: 0.6px; }

        input[type="text"], select, textarea {
            font-family: inherit; font-size: 14.5px; padding: 14px 18px; border: 1px solid transparent; 
            border-radius: var(--radius-md); background-color: var(--bg-input); color: var(--text-title); 
            outline: none; transition: all 0.25s ease; font-weight: 500;
        }
        input:focus, select:focus, textarea:focus { background-color: var(--bg-input-focus); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
        .select-wrapper { position: relative; }
        .select-wrapper select { width: 100%; appearance: none; cursor: pointer; }

        /* BOTONES DE ROL (CHIPS CON CHECK VERDE) */
        .role-selector-container { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
        .role-chip-btn {
            position: relative; flex: 1; min-width: 120px; font-family: inherit; background-color: var(--bg-input);
            color: var(--text-body); border: 2px solid transparent; padding: 12px 16px; font-size: 14px;
            font-weight: 600; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-chip-btn:hover { background-color: var(--border-interactive); color: var(--text-title); transform: translateY(-1px); }
        
        .role-chip-btn.active { background-color: var(--bg-card); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); transform: scale(1.02); font-weight: 700; }
        .role-chip-btn.active::after {
            content: "✓"; position: absolute; top: -8px; right: -8px; background-color: var(--success); color: white;
            font-size: 12px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .chip-icon { font-size: 16px; }

        .btn-submit {
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; background: var(--accent);
            color: #ffffff; border: none; padding: 16px; font-size: 15px; font-weight: 700; border-radius: var(--radius-md);
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-submit:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25); transform: translateY(-1px); }

        /* BÚSQUEDA Y FILTROS */
        .filters-section { margin-bottom: 32px; display: flex; flex-direction: column; gap: 16px; }
        .search-box { position: relative; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box input { width: 100%; padding: 16px 16px 16px 48px; background-color: var(--bg-card); border: 1px solid var(--border-premium); box-shadow: var(--shadow-premium); border-radius: var(--radius-lg); }
        
        .filter-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .filter-controls select { padding: 12px 16px; border-radius: var(--radius-md); background-color: var(--bg-card); border: 1px solid var(--border-premium); font-size: 13.5px; font-weight: 600; color: var(--text-body); outline: none; cursor: pointer; box-shadow: var(--shadow-premium); }

        /* TARJETAS Y COMENTARIOS */
        .post-card { background-color: var(--bg-card); border: 1px solid var(--border-premium); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow-premium); position: relative; }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .meta-user { display: flex; flex-direction: column; }
        .post-author { font-weight: 800; font-size: 16px; color: var(--text-title); }
        .post-role { font-size: 12.5px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
        .post-date { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }

        .badges-container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: flex-end;}
        .badge { font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.comunicado { background-color: var(--bg-comunicado); color: var(--color-comunicado); }
        .badge.consulta { background-color: var(--bg-consulta); color: var(--color-consulta); }
        .badge.subject { background-color: var(--bg-asignatura); color: var(--color-asignatura); border: 1px solid rgba(16, 185, 129, 0.2); }
        
        .btn-delete { background-color: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-delete:hover { background-color: #dc2626; transform: scale(1.05); }

        .post-title { font-size: 19px; font-weight: 800; margin-bottom: 12px; color: var(--text-title); line-height: 1.4; }
        .post-body { font-size: 15px; color: var(--text-body); white-space: pre-line; }

        /* HILOS DE RESPUESTAS */
        .replies-container { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-premium); }
        .replies-title { font-size: 13px; font-weight: 800; color: var(--text-title); margin-bottom: 14px; text-transform: uppercase; }
        .reply-item { background-color: rgba(226, 231, 240, 0.4); border-left: 4px solid var(--accent); padding: 14px 18px; border-radius: 4px var(--radius-md) var(--radius-md) 4px; margin-bottom: 12px; position: relative;}
        .reply-meta { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; }
        .reply-user { font-weight: 800; color: var(--text-title); }
        .reply-role { color: var(--text-muted); font-weight: 600; font-size: 11.5px; margin-left: 4px; text-transform: uppercase; }
        .reply-body { font-size: 14px; color: var(--text-body); }
        
        .reply-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .reply-mini-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 480px){ .reply-mini-grid { grid-template-columns: 1fr 1fr; } }
        .input-reply-small { padding: 10px 14px; font-size: 13px; background-color: var(--bg-input); }
        .btn-reply { align-self: flex-end; background-color: var(--text-title); color: #ffffff; border: none; padding: 8px 18px; font-size: 12.5px; font-weight: 700; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s; }
        .btn-reply:hover { background-color: var(--accent); }

        .transition-card { animation: cardArrival 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .new-post-anim { animation: postPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes cardArrival { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes postPop { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .spinner { animation: spin 0.85s linear infinite; width: 20px; height: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 60px 30px; background-color: var(--bg-card); border: 2px dashed var(--border-interactive); border-radius: var(--radius-lg); box-shadow: var(--shadow-premium); }
        .empty-state h3 { color: var(--text-title); font-size: 18px; font-weight: 800; margin-top: 14px; }
        .empty-state p { color: var(--text-muted); font-size: 14.5px; margin-top: 4px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="brand">
                    <div class="logo-wrapper">
                        <svg class="logo-svg" width="44" height="44" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="netGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#4f46e5" />
                                    <stop offset="100%" stop-color="#06b6d4" />
                                </linearGradient>
                                <linearGradient id="netGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#ec4899" />
                                </linearGradient>
                            </defs>
                            <circle cx="16" cy="16" r="6" fill="url(#netGrad1)" />
                            <circle cx="34" cy="20" r="8" fill="url(#netGrad2)" />
                            <circle cx="22" cy="36" r="5" fill="url(#netGrad1)" />
                            <path d="M16 16 L34 20 M34 20 L22 36 M22 36 L16 16" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" opacity="0.4" fill="none"/>
                            <circle cx="25" cy="22" r="3" fill="#06b6d4" />
                        </svg>
                    </div>
                    <h1>conectado<span>.cl</span></h1>
                </div>
                <p class="subtitle">Plataforma de Comunicación Escolar Integrada</p>
            </div>
            <button id="admin-btn" class="btn-admin">Modo Admin</button>
        </div>
    </header>

    <main class="main-content">
        <section class="form-section transition-card">
            <div class="section-header">
                <h2 class="section-title">Crear Nueva Publicación</h2>
            </div>
            <form id="qa-form">
                <div class="form-grid triple">
                    <div class="form-group">
                        <label for="author-name">Nombre Completo</label>
                        <input type="text" id="author-name" placeholder="Ej. Juan Pablo Correa" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Clasificación</label>
                        <div class="select-wrapper">
                            <select id="category" required>
                                <option value="Comunicado">📢 Aviso Oficial</option>
                                <option value="Consulta">❓ Consulta</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="subject">Asignatura</label>
                        <div class="select-wrapper">
                            <select id="subject" required>
                                <option value="Institucional">💼 Institucional / General</option>
                                <option value="Lenguaje">📚 Lengua y Literatura</option>
                                <option value="Matemáticas">📐 Matemáticas</option>
                                <option value="Ciencias Naturales">🔬 Ciencias Naturales</option>
                                <option value="Historia">🌍 Historia, Geografía y Cs. Sociales</option>
                                <option value="Inglés">🇬🇧 Idioma Extranjero: Inglés</option>
                                <option value="Artes Visuales">🎨 Artes Visuales</option>
                                <option value="Música">🎵 Música</option>
                                <option value="Educación Física">🏃 Educación Física y Salud</option>
                                <option value="Tecnología">💻 Tecnología</option>
                                <option value="Orientación">🌱 Orientación</option>
                                <option value="Religión">⛪ Religión</option>
                                <option value="Filosofía">🧠 Filosofía (3° y 4° Medio)</option>
                                <option value="Educación Ciudadana">🇨🇱 Ed. Ciudadana (3° y 4° Medio)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-block">Selecciona tu Rol (Requerido)</label>
                    <div class="role-selector-container" id="role-selector-group">
                        <button type="button" class="role-chip-btn" data-role="Docente"><span class="chip-icon">🏫</span> Docente</button>
                        <button type="button" class="role-chip-btn" data-role="Apoderado"><span class="chip-icon">🏠</span> Apoderado</button>
                        <button type="button" class="role-chip-btn" data-role="Funcionario"><span class="chip-icon">💼</span> Funcionario</button>
                    </div>
                    <input type="hidden" id="author-role" required>
                </div>

                <div class="form-group">
                    <label for="title">Título o Asunto</label>
                    <input type="text" id="title" placeholder="Ej. Citación a reunión..." required>
                </div>

                <div class="form-group">
                    <label for="message">Detalle del Mensaje</label>
                    <textarea id="message" rows="4" placeholder="Redacta la información clara para la comunidad..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <span class="btn-text">Publicar en la Línea de Tiempo</span>
                    <svg class="spinner hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.2"></circle><path d="M12 2C6.47715 2 2 6.47715 2 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path></svg>
                </button>
            </form>
        </section>

        <section class="filters-section transition-card">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Buscar por palabra clave o nombre...">
            </div>
            
            <div class="filter-controls">
                <select id="filter-category">
                    <option value="Todos">Todos los tipos</option>
                    <option value="Comunicado">Solo Avisos Oficiales</option>
                    <option value="Consulta">Solo Consultas</option>
                </select>
                <select id="filter-subject">
                    <option value="Todos">Todas las Asignaturas</option>
                    <option value="Institucional">Institucional</option>
                    <option value="Lenguaje">Lengua y Literatura</option>
                    <option value="Matemáticas">Matemáticas</option>
                    <option value="Ciencias Naturales">Ciencias Naturales</option>
                    <option value="Historia">Historia, Geografía y Cs. Sociales</option>
                    <option value="Inglés">Inglés</option>
                    <option value="Artes Visuales">Artes Visuales</option>
                    <option value="Música">Música</option>
                    <option value="Educación Física">Educación Física y Salud</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Orientación">Orientación</option>
                    <option value="Religión">Religión</option>
                    <option value="Filosofía">Filosofía</option>
                    <option value="Educación Ciudadana">Educación Ciudadana</option>
                </select>
            </div>
        </section>

        <section class="feed-section">
            <div id="posts-container"></div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = 'conectado_db_v_classic_final';
        let posts = [];
        let searchQuery = '';
        let currentFilterCategory = 'Todos';
        let currentFilterSubject = 'Todos';
        let isAdmin = false;

        const qaForm = document.getElementById('qa-form');
        const postsContainer = document.getElementById('posts-container');
        const searchInput = document.getElementById('search-input');
        const filterCategory = document.getElementById('filter-category');
        const filterSubject = document.getElementById('filter-subject');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = submitBtn.querySelector('.btn-text');
        const spinner = submitBtn.querySelector('.spinner');
        const roleChips = document.querySelectorAll('.role-chip-btn');
        const hiddenRoleInput = document.getElementById('author-role');
        const adminBtn = document.getElementById('admin-btn');

        // Mapeo amigable de visualización para las tarjetas de la línea de tiempo
        const subjectLabels = {
            'Institucional': '💼 Institucional', 'Lenguaje': '📚 Lenguaje', 'Matemáticas': '📐 Matemáticas',
            'Ciencias Naturales': '🔬 Ciencias Naturales', 'Historia': '🌍 Historia y Cs. Sociales', 'Inglés': '🇬🇧 Inglés',
            'Artes Visuales': '🎨 Artes Visuales', 'Música': '🎵 Música', 'Educación Física': '🏃 Ed. Física y Salud',
            'Tecnología': '💻 Tecnología', 'Orientación': '🌱 Orientación', 'Religión': '⛪ Religión',
            'Filosofía': '🧠 Filosofía', 'Educación Ciudadana': '🇨🇱 Ed. Ciudadana'
        };

        function init() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                posts = stored ? JSON.parse(stored) : [];
            } catch (e) {
                posts = [];
            }
            renderPosts();
            setupEventListeners();
        }

        function saveToStorage() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); } catch (e) {}
        }

        function setupEventListeners() {
            qaForm.addEventListener('submit', handleCreatePost);

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderPosts();
            });

            filterCategory.addEventListener('change', (e) => {
                currentFilterCategory = e.target.value;
                renderPosts();
            });

            filterSubject.addEventListener('change', (e) => {
                currentFilterSubject = e.target.value;
                renderPosts();
            });

            roleChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    roleChips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    hiddenRoleInput.value = chip.getAttribute('data-role');
                });
            });

            adminBtn.addEventListener('click', toggleAdmin);
        }

        function toggleAdmin() {
            if(isAdmin) {
                isAdmin = false;
                adminBtn.textContent = "Modo Admin";
                adminBtn.classList.remove('active');
                renderPosts();
            } else {
                const u = prompt("Usuario:");
                const p = prompt("Contraseña:");
                if(u === 'admin' && p === 'admin') {
                    isAdmin = true;
                    adminBtn.textContent = "Salir Admin";
                    adminBtn.classList.add('active');
                    renderPosts();
                } else {
                    alert("Credenciales incorrectas.");
                }
            }
        }

        window.deletePost = function(id) {
            if(confirm("¿Eliminar publicación permanentemente?")) {
                posts = posts.filter(p => p.id !== id);
                saveToStorage();
                renderPosts();
            }
        }

        window.deleteReply = function(postId, replyId) {
            if(confirm("¿Eliminar este comentario?")) {
                const post = posts.find(p => p.id === postId);
                if(post) {
                    post.replies = post.replies.filter(r => r.id !== replyId);
                    saveToStorage();
                    renderPosts();
                }
            }
        }

        function handleCreatePost(e) {
            e.preventDefault();
            if (!hiddenRoleInput.value) {
                alert('Selecciona tu Rol antes de publicar.');
                return;
            }

            submitBtn.disabled = true;
            btnText.textContent = 'Procesando...';
            spinner.classList.remove('hidden');

            setTimeout(() => {
                const newPost = {
                    id: 'post_' + Date.now(),
                    authorName: document.getElementById('author-name').value.trim(),
                    authorRole: hiddenRoleInput.value,
                    category: document.getElementById('category').value,
                    subject: document.getElementById('subject').value,
                    title: document.getElementById('title').value.trim(),
                    message: document.getElementById('message').value.trim(),
                    date: new Date().toLocaleString('es-CL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }),
                    replies: []
                };

                posts.unshift(newPost);
                saveToStorage();
                renderPosts(newPost.id); 
                
                qaForm.reset();
                roleChips.forEach(c => c.classList.remove('active'));
                hiddenRoleInput.value = '';
                submitBtn.disabled = false;
                btnText.textContent = 'Publicar en la Línea de Tiempo';
                spinner.classList.add('hidden');
            }, 500);
        }

        function handleCreateReply(e, postId) {
            e.preventDefault();
            const form = e.target;
            const postIndex = posts.findIndex(p => p.id === postId);
            if (postIndex !== -1) {
                const newReply = {
                    id: 'reply_' + Date.now(),
                    authorName: form.querySelector('.reply-name').value.trim(),
                    authorRole: form.querySelector('.reply-role').value.trim(),
                    message: form.querySelector('.reply-body-input').value.trim(),
                    date: new Date().toLocaleString('es-CL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })
                };
                posts[postIndex].replies.push(newReply);
                saveToStorage();
                renderPosts();
            }
        }

        function renderPosts(newPostId = null) {
            postsContainer.innerHTML = '';

            const filteredPosts = posts.filter(post => {
                const matchCat = (currentFilterCategory === 'Todos' || post.category === currentFilterCategory);
                const matchSub = (currentFilterSubject === 'Todos' || post.subject === currentFilterSubject);
                const matchSearch = (
                    post.title.toLowerCase().includes(searchQuery) ||
                    post.message.toLowerCase().includes(searchQuery) ||
                    post.authorName.toLowerCase().includes(searchQuery)
                );
                return matchCat && matchSub && matchSearch;
            });

            if (filteredPosts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="empty-state transition-card">
                        <h3>Línea de tiempo vacía</h3>
                        <p>No hay mensajes que coincidan con la búsqueda o filtros.</p>
                    </div>`;
                return;
            }

            filteredPosts.forEach(post => {
                const isNew = post.id === newPostId;
                const badgeClass = post.category === 'Comunicado' ? 'comunicado' : 'consulta';
                const card = document.createElement('article');
                card.className = `post-card ${isNew ? 'new-post-anim' : 'transition-card'}`;

                let repliesHTML = '';
                if (post.replies && post.replies.length > 0) {
                    repliesHTML = post.replies.map(reply => `
                        <div class="reply-item">
                            <div class="reply-meta">
                                <div>
                                    <span class="reply-user">${escapeHTML(reply.authorName)}</span>
                                    <span class="reply-role">• ${escapeHTML(reply.authorRole)}</span>
                                </div>
                                <div style="display:flex; gap:8px; align-items:center;">
                                    <span class="reply-date">${reply.date}</span>
                                    ${isAdmin ? `<button class="btn-delete" onclick="deleteReply('${post.id}', '${reply.id}')">X</button>` : ''}
                                </div>
                            </div>
                            <p class="reply-body">${escapeHTML(reply.message)}</p>
                        </div>
                    `).join('');
                }

                const displaySubject = subjectLabels[post.subject] || '💼 Institucional';

                card.innerHTML = `
                    <div class="post-header">
                        <div class="meta-user">
                            <span class="post-author">${escapeHTML(post.authorName)}</span>
                            <span class="post-role">${escapeHTML(post.authorRole)}</span>
                            <span class="post-date">${post.date}</span>
                        </div>
                        <div class="badges-container">
                            <span class="badge ${badgeClass}">${post.category}</span>
                            <span class="badge subject">${displaySubject}</span>
                            ${isAdmin ? `<button class="btn-delete" onclick="deletePost('${post.id}')">Eliminar</button>` : ''}
                        </div>
                    </div>
                    <h3 class="post-title">${escapeHTML(post.title)}</h3>
                    <p class="post-body">${escapeHTML(post.message)}</p>

                    <div class="replies-container">
                        ${post.replies.length > 0 ? `<h4 class="replies-title">Respuestas (${post.replies.length})</h4>` : ''}
                        <div class="replies-list">${repliesHTML}</div>
                        
                        <form class="reply-form" data-postid="${post.id}">
                            <div class="reply-mini-grid">
                                <input type="text" placeholder="Tu nombre" class="input-reply-small reply-name" required>
                                <input type="text" placeholder="Tu rol (ej. Apoderado)" class="input-reply-small reply-role" required>
                            </div>
                            <input type="text" placeholder="Añadir comentario oficial al hilo..." class="input-reply-small reply-body-input" required>
                            <button type="submit" class="btn-reply">Comentar</button>
                        </form>
                    </div>
                `;

                const replyForm = card.querySelector('.reply-form');
                replyForm.addEventListener('submit', (e) => handleCreateReply(e, post.id));

                postsContainer.appendChild(card);
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
